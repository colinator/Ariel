<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="420" fill="#fafafa" rx="12"/>

  <!-- ==================== LEFT SIDE: LLM-in-loop ==================== -->
  <g transform="translate(10, 0)">
    <!-- Section background -->
    <rect x="15" y="50" width="420" height="350" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>

    <!-- Title -->
    <text x="225" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">LLM-in-the-Loop</text>

    <!-- External input arrow -->
    <line x1="30" y1="179" x2="85" y2="179" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="58" y="169" text-anchor="middle" font-size="12" fill="#777">prompt</text>

    <!-- LLM Box -->
    <rect x="90" y="134" width="110" height="90" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="145" y="172" text-anchor="middle" font-size="17" font-weight="600" fill="#1e40af">LLM</text>
    <text x="145" y="191" text-anchor="middle" font-size="11" fill="#64748b">reason, decide,</text>
    <text x="145" y="203" text-anchor="middle" font-size="11" fill="#64748b">send command</text>

    <!-- Arrow: LLM -> Robot (commands) — 20% longer -->
    <line x1="200" y1="164" x2="294" y2="164" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="247" y="154" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">RobotCommand</text>

    <!-- Arrow: Robot -> LLM (state) — 20% longer -->
    <line x1="294" y1="194" x2="200" y2="194" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="247" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">Image / State</text>

    <!-- Robot arm group -->
    <g transform="translate(296, 124)">
      <!-- Base -->
      <rect x="0" y="85" width="60" height="15" rx="4" fill="#94a3b8" stroke="#64748b" stroke-width="1.5"/>
      <!-- Lower arm -->
      <rect x="22" y="50" width="16" height="40" rx="3" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5" transform="rotate(-15, 30, 90)"/>
      <!-- Joint -->
      <circle cx="30" cy="50" r="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
      <!-- Upper arm -->
      <rect x="22" y="12" width="16" height="42" rx="3" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5" transform="rotate(20, 30, 50)"/>
      <!-- Wrist joint -->
      <circle cx="38" cy="14" r="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
      <!-- Camera at end -->
      <rect x="33" y="2" width="18" height="14" rx="3" fill="#1e293b" stroke="#0f172a" stroke-width="1"/>
      <circle cx="42" cy="9" r="4" fill="#334155" stroke="#1e293b" stroke-width="1"/>
      <circle cx="42" cy="9" r="2" fill="#60a5fa"/>
      <!-- Camera label -->
      <text x="42" y="-5" text-anchor="middle" font-size="10" fill="#64748b">cam</text>
    </g>

    <!-- Loop indicator -->
    <path d="M 145,239 C 145,269 145,269 233,269 C 321,269 321,269 321,239" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="233" y="285" text-anchor="middle" font-size="11" fill="#94a3b8">every step</text>

    <!-- Timing note -->
    <text x="220" y="349" text-anchor="middle" font-size="14" font-style="italic" fill="#94a3b8">Each action requires a full LLM roundtrip.</text>
    <text x="220" y="368" text-anchor="middle" font-size="14" font-style="italic" fill="#94a3b8">Latency: ~1-3s per step.</text>
  </g>

  <!-- Divider -->
  <line x1="460" y1="60" x2="460" y2="390" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ==================== RIGHT SIDE: LLM sends program ==================== -->
  <g transform="translate(470, 0)">
    <!-- Section background -->
    <rect x="15" y="50" width="420" height="350" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>

    <!-- Title -->
    <text x="225" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">LLM-authored Program</text>

    <!-- External input arrow -->
    <line x1="30" y1="179" x2="85" y2="179" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="58" y="169" text-anchor="middle" font-size="12" fill="#777">prompt</text>

    <!-- LLM Box -->
    <rect x="90" y="134" width="110" height="90" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="145" y="172" text-anchor="middle" font-size="17" font-weight="600" fill="#1e40af">LLM</text>
    <text x="145" y="191" text-anchor="middle" font-size="11" fill="#64748b">reason, write</text>
    <text x="145" y="203" text-anchor="middle" font-size="11" fill="#64748b">program</text>

    <!-- Arrow: LLM -> Robot (program) — 20% longer -->
    <line x1="200" y1="164" x2="294" y2="164" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <text x="247" y="154" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">Program</text>

    <!-- Arrow: Robot -> LLM (async state) — 20% longer -->
    <line x1="294" y1="194" x2="200" y2="194" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
    <text x="247" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">Image / State</text>
    <text x="247" y="227" text-anchor="middle" font-size="10" fill="#16a34a">(async, on demand)</text>

    <!-- Robot arm group -->
    <g transform="translate(296, 124)">
      <!-- Base -->
      <rect x="0" y="85" width="60" height="15" rx="4" fill="#94a3b8" stroke="#64748b" stroke-width="1.5"/>
      <!-- Lower arm -->
      <rect x="22" y="50" width="16" height="40" rx="3" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5" transform="rotate(-15, 30, 90)"/>
      <!-- Joint -->
      <circle cx="30" cy="50" r="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
      <!-- Upper arm -->
      <rect x="22" y="12" width="16" height="42" rx="3" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5" transform="rotate(20, 30, 50)"/>
      <!-- Wrist joint -->
      <circle cx="38" cy="14" r="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
      <!-- Camera at end -->
      <rect x="33" y="2" width="18" height="14" rx="3" fill="#1e293b" stroke="#0f172a" stroke-width="1"/>
      <circle cx="42" cy="9" r="4" fill="#334155" stroke="#1e293b" stroke-width="1"/>
      <circle cx="42" cy="9" r="2" fill="#60a5fa"/>
      <!-- Camera label -->
      <text x="42" y="-5" text-anchor="middle" font-size="10" fill="#64748b">cam</text>
    </g>

    <!-- Running program loop icon — centered on arrow midline, over robot, 80% opacity -->
    <g transform="translate(279, 152)" opacity="0.8">
      <rect x="0" y="0" width="76" height="56" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
      <!-- Circular arrow (loop) -->
      <path d="M 22,18 A 8,8 0 1 1 30,10" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
      <path d="M 28,7 L 31,11 L 27,12" fill="#7c3aed"/>
      <!-- Code lines -->
      <line x1="40" y1="12" x2="60" y2="12" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="40" y1="18" x2="55" y2="18" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="40" y1="24" x2="62" y2="24" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Caption inside box -->
      <text x="38" y="39" text-anchor="middle" font-size="9.5" fill="#7c3aed">closed loop</text>
      <text x="38" y="49" text-anchor="middle" font-size="9.5" fill="#7c3aed">running locally</text>
    </g>

    <!-- Loop indicator -->
    <path d="M 145,239 C 145,269 145,269 233,269 C 321,269 321,269 321,239" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="233" y="285" text-anchor="middle" font-size="11" fill="#94a3b8">whenever</text>

    <!-- Timing note -->
    <text x="220" y="349" text-anchor="middle" font-size="14" font-style="italic" fill="#94a3b8">Program runs at sensor rate on the robot.</text>
    <text x="220" y="368" text-anchor="middle" font-size="14" font-style="italic" fill="#94a3b8">Latency: ~ms per step.</text>
  </g>
</svg>