<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 820" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13">
  <rect width="880" height="820" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="diamond" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 4, 6 0, 12 4, 6 8" fill="#888" stroke="#888" stroke-width="0.5"/>
    </marker>
    <style>
      .cls-abstract { fill: #eef2ff; stroke: #4361ee; stroke-width: 1.5; rx: 6; }
      .cls-concrete { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 6; }
      .cls-hardware { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.5; rx: 6; }
      .cls-helper { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 6; }
      .cls-box { fill: #f8f9fa; stroke: #333; stroke-width: 1.5; rx: 6; }
      .title { font-size: 14px; font-weight: 600; }
      .abstract-tag { font-size: 10px; fill: #4361ee; font-style: italic; }
      .section-tag { font-size: 10px; fill: #888; font-style: italic; }
      .method { font-size: 11.5px; fill: #444; font-family: 'SF Mono', 'Fira Code', monospace; }
      .sep { stroke: #ccc; stroke-width: 0.75; }
      .inh-line { stroke: #555; stroke-width: 1.5; fill: none; }
      .comp-line { stroke: #888; stroke-width: 1.2; stroke-dasharray: 6,3; fill: none; }
      .transport-line { stroke: #dc2626; stroke-width: 1.4; stroke-dasharray: 6,3; fill: none; }
      .legend-text { font-size: 11px; fill: #555; }
    </style>
  </defs>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#222">Pan/Tilt Robot: Concrete Implementation</text>

  <!-- ═══════════════ Legend ═══════════════ -->
  <g transform="translate(340, 50)">
    <rect x="0" y="0" width="480" height="48" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="4"/>
    <line x1="18" y1="16" x2="48" y2="16" class="inh-line" marker-end="url(#arrow)"/>
    <text x="56" y="20" class="legend-text">inherits</text>
    <line x1="120" y1="16" x2="150" y2="16" class="comp-line" marker-start="url(#diamond)"/>
    <text x="158" y="20" class="legend-text">has-a</text>
    <line x1="210" y1="16" x2="240" y2="16" class="transport-line" marker-end="url(#arrow-red)"/>
    <text x="248" y="20" class="legend-text">ZMQ ipc://</text>
    <rect x="16" y="28" width="12" height="12" class="cls-abstract"/>
    <text x="34" y="39" class="legend-text">abstract</text>
    <rect x="100" y="28" width="12" height="12" class="cls-concrete"/>
    <text x="118" y="39" class="legend-text">proxy</text>
    <rect x="175" y="28" width="12" height="12" class="cls-hardware"/>
    <text x="193" y="39" class="legend-text">hardware</text>
    <rect x="265" y="28" width="12" height="12" class="cls-helper"/>
    <text x="283" y="39" class="legend-text">helper</text>
  </g>

  <!-- ═══════════════ ABC ═══════════════ -->
  <rect class="cls-box" x="50" y="55" width="170" height="32"/>
  <text x="135" y="76" text-anchor="middle" class="title">ABC</text>

  <!-- ═══════════════ RobotBase (compact) ═══════════════ -->
  <rect class="cls-abstract" x="10" y="125" width="250" height="246"/>
  <text x="20" y="143" class="abstract-tag">&lt;&lt;abstract&gt;&gt;</text>
  <text x="135" y="161" text-anchor="middle" class="title">RobotBase</text>
  <line x1="10" y1="169" x2="260" y2="169" class="sep"/>
  <text x="20" y="183" class="section-tag">abstract</text>
  <text x="20" y="199" class="method">+ connect()</text>
  <text x="20" y="215" class="method">+ close()</text>
  <text x="20" y="231" class="method">+ snapshot(device)</text>
  <text x="20" y="247" class="method">+ _device_docs()</text>
  <line x1="10" y1="255" x2="260" y2="255" class="sep"/>
  <text x="20" y="269" class="section-tag">concrete</text>
  <text x="20" y="285" class="method">+ describe()  [template]</text>
  <text x="20" y="301" class="method">+ _runtime_api_docs()</text>
  <text x="20" y="317" class="method">+ show(fig)</text>
  <text x="20" y="333" class="method">+ run(fn, duration, hz)</text>
  <text x="20" y="349" class="method">+ start_task(name, fn)</text>
  <text x="20" y="365" class="method">+ stop_task(name)</text>

  <!-- Inheritance: ABC → RobotBase -->
  <line x1="135" y1="87" x2="135" y2="125" class="inh-line" marker-end="url(#arrow)"/>

  <!-- ═══════════════ PanTiltRobotProxy ═══════════════ -->
  <rect class="cls-concrete" x="10" y="435" width="250" height="230"/>
  <text x="135" y="455" text-anchor="middle" class="title">PanTiltRobotProxy</text>
  <line x1="10" y1="463" x2="260" y2="463" class="sep"/>
  <text x="20" y="477" class="section-tag">abstract method implementations</text>
  <text x="20" y="493" class="method">+ connect()</text>
  <text x="20" y="509" class="method">+ close()</text>
  <text x="20" y="525" class="method">+ snapshot(device)</text>
  <text x="20" y="541" class="method">+ _device_docs()</text>
  <line x1="10" y1="549" x2="260" y2="549" class="sep"/>
  <text x="20" y="563" class="section-tag">proxy-specific</text>
  <text x="20" y="579" class="method">+ cameras, motors</text>
  <text x="20" y="595" class="method">+ set_positions(**kw)</text>
  <text x="20" y="611" class="method">+ is_alive()</text>
  <text x="20" y="627" class="method">+ start_logging()</text>
  <text x="20" y="643" class="method">+ stop_logging(logger)</text>
  <text x="20" y="659" class="method">+ _drain_images()</text>

  <!-- Inheritance: RobotBase → PanTiltRobotProxy -->
  <line x1="135" y1="371" x2="135" y2="435" class="inh-line" marker-end="url(#arrow)"/>

  <!-- ═══════════════ Helper classes (stacked column) ═══════════════ -->

  <!-- CameraProxy -->
  <rect class="cls-helper" x="300" y="435" width="170" height="80"/>
  <text x="385" y="455" text-anchor="middle" class="title">CameraProxy</text>
  <line x1="300" y1="463" x2="470" y2="463" class="sep"/>
  <text x="310" y="479" class="method">+ grab_frame(timeout)</text>
  <text x="310" y="495" class="method">+ start() / stop()</text>
  <text x="310" y="511" font-size="10" fill="#888" font-style="italic">ZMQ sub → latest RGB frame</text>

  <!-- _MotorStateReceiver -->
  <rect class="cls-helper" x="300" y="525" width="170" height="90"/>
  <text x="385" y="541" text-anchor="middle" font-size="12" font-weight="600">_MotorStateReceiver</text>
  <line x1="300" y1="549" x2="470" y2="549" class="sep"/>
  <text x="310" y="565" class="method">+ get(motor_id)</text>
  <text x="310" y="581" class="method">+ start() / stop()</text>
  <text x="310" y="597" class="method">+ add_logger(logger)</text>
  <text x="310" y="611" font-size="10" fill="#888" font-style="italic">ZMQ sub → per-motor state</text>

  <!-- MotorProxy -->
  <rect class="cls-helper" x="300" y="625" width="170" height="80"/>
  <text x="385" y="645" text-anchor="middle" class="title">MotorProxy</text>
  <line x1="300" y1="653" x2="470" y2="653" class="sep"/>
  <text x="310" y="669" class="method">+ get_position()</text>
  <text x="310" y="685" class="method">+ set_position(val)</text>
  <text x="310" y="701" font-size="10" fill="#888" font-style="italic">Safety-clamped to limits</text>

  <!-- DataLogger -->
  <rect class="cls-helper" x="300" y="715" width="170" height="65"/>
  <text x="385" y="735" text-anchor="middle" class="title">DataLogger</text>
  <line x1="300" y1="743" x2="470" y2="743" class="sep"/>
  <text x="310" y="759" class="method">+ get_data()</text>
  <text x="310" y="775" class="method">+ stop() / clear()</text>

  <!-- Composition: PanTiltRobotProxy → helpers -->
  <line x1="260" y1="480" x2="300" y2="475" class="comp-line" marker-start="url(#diamond)"/>
  <line x1="260" y1="510" x2="300" y2="570" class="comp-line" marker-start="url(#diamond)"/>
  <line x1="260" y1="540" x2="300" y2="660" class="comp-line" marker-start="url(#diamond)"/>
  <line x1="260" y1="630" x2="300" y2="747" class="comp-line" marker-start="url(#diamond)"/>

  <!-- MotorProxy reads from _MotorStateReceiver -->
  <line x1="385" y1="615" x2="385" y2="625" class="comp-line"/>
  <text x="400" y="623" font-size="8" fill="#888">reads</text>

  <!-- _MotorStateReceiver feeds DataLogger -->
  <line x1="385" y1="705" x2="385" y2="715" class="comp-line"/>
  <text x="400" y="713" font-size="8" fill="#888">feeds</text>

  <!-- ═══════════════ PanTiltRobot (hardware, right column) ═══════════════ -->
  <rect class="cls-hardware" x="620" y="480" width="250" height="160"/>
  <text x="630" y="498" font-size="10" fill="#dc2626" font-style="italic">separate process (hardware.py)</text>
  <text x="745" y="518" text-anchor="middle" class="title">PanTiltRobot</text>
  <line x1="620" y1="526" x2="870" y2="526" class="sep"/>
  <text x="630" y="542" class="method">+ start()</text>
  <text x="630" y="558" class="method">+ stop()</text>
  <line x1="620" y1="568" x2="870" y2="568" class="sep"/>
  <text x="630" y="584" font-size="10" fill="#888" font-style="italic">WebcamSensor → ZMQ pub (camera frames)</text>
  <text x="630" y="600" font-size="10" fill="#888" font-style="italic">DynamixelGroupNode → ZMQ pub (motor state)</text>
  <text x="630" y="616" font-size="10" fill="#888" font-style="italic">ZMQ sub ← motor commands</text>

  <!-- ═══════════════ Three ZMQ transport lines (horizontal) ═══════════════ -->

  <!-- 1. PanTiltRobot → CameraProxy (camera frames, pub→sub) -->
  <line x1="620" y1="584" x2="470" y2="475" class="transport-line" marker-end="url(#arrow-red)"/>
  <text x="545" y="510" font-size="9" fill="#dc2626" font-style="italic" text-anchor="middle">camera frames</text>

  <!-- 2. PanTiltRobot → _MotorStateReceiver (motor state, pub→sub) -->
  <line x1="620" y1="600" x2="470" y2="570" class="transport-line" marker-end="url(#arrow-red)"/>
  <text x="545" y="578" font-size="9" fill="#dc2626" font-style="italic" text-anchor="middle">motor state</text>

  <!-- 3. MotorProxy → PanTiltRobot (motor commands, publish) -->
  <line x1="470" y1="670" x2="620" y2="616" class="transport-line" marker-end="url(#arrow-red)"/>
  <text x="545" y="656" font-size="9" fill="#dc2626" font-style="italic" text-anchor="middle">motor cmds</text>
</svg>
